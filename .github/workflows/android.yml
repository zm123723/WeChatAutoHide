name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download and Setup Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          export GRADLE_HOME=$PWD/gradle-8.2
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle --version
          
      - name: Build Debug APK
        run: |
          export GRADLE_HOME=$PWD/gradle-8.2
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle assembleDebug --stacktrace --info
      
      - name: Verify APK
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found!"
            find app/build -name "*.apk"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WeChatAutoHide-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
