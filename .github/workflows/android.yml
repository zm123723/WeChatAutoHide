name: Build APK (Main)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.2
          export PATH=$GRADLE_HOME/bin:$PATH
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
          gradle --version
          
      - name: Build APK
        run: gradle assembleDebug --stacktrace --info
      
      - name: Check APK
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found"
            find app/build/outputs -name "*.apk"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: WeChatAutoHide-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
